name: Release Bootstrap Installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Installer version override (e.g. 0.1.0 or v0.1.0)"
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-installers:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve installer version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          raw=""
          if [ "$EVENT_NAME" = "release" ] && [ -n "${RELEASE_TAG:-}" ]; then
            raw="$RELEASE_TAG"
          elif [ -n "${INPUT_VERSION:-}" ]; then
            raw="$INPUT_VERSION"
          else
            raw=""
          fi

          if [ -n "$raw" ]; then
            clean="${raw#v}"
            if [[ ! "$clean" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::Invalid version '$raw'. Use SemVer like 0.1.0 or v0.1.0"
              exit 1
            fi
            echo "installer_version=$clean" >> "$GITHUB_OUTPUT"
            echo "Using installer version: $clean"
          else
            echo "installer_version=" >> "$GITHUB_OUTPUT"
            echo "No override version provided; using checked-in installer version"
          fi

      - name: Apply installer version override
        if: steps.version.outputs.installer_version != ''
        shell: bash
        env:
          INSTALLER_VERSION: ${{ steps.version.outputs.installer_version }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const version = process.env.INSTALLER_VERSION;
          if (!version) process.exit(0);

          const pkgPath = 'apps/bootstrap-installer/package.json';
          const tauriPath = 'apps/bootstrap-installer/src-tauri/tauri.conf.json';
          const cargoPath = 'apps/bootstrap-installer/src-tauri/Cargo.toml';
          const manifestPath = 'apps/bootstrap-installer/src-tauri/hermes-setup.manifest';

          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          pkg.version = version;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');

          const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          tauri.version = version;
          fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + '\n');

          const cargo = fs.readFileSync(cargoPath, 'utf8')
            .replace(/^version\s*=\s*"[^"]+"/m, `version = "${version}"`);
          fs.writeFileSync(cargoPath, cargo);

          // NOTE: the manifest no longer contains a root <assemblyIdentity>
          // so there is no version field to update. Skipping manifest
          // version replacement avoids the regex accidentally matching
          // the <?xml version="1.0"?> declaration and corrupting it.
          // (Previously: .replace(/version="[0-9A-Za-z.+-]+"/m, ...) was
          // hitting the XML declaration's own version="1.0" attribute,
          // replacing it with e.g. version="0.0.8.0" — invalid XML that
          // made Windows SxS refuse to load the activation context.)

          console.log(`Applied installer version ${version}`);
          NODE

      - name: Validate install.ps1 syntax (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $errors = $null
          $tokens = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
              "${{ github.workspace }}\scripts\install.ps1",
              [ref]$tokens,
              [ref]$errors
          )
          if ($errors.Count -gt 0) {
              $errors | ForEach-Object {
                  Write-Error "install.ps1 syntax error — line $($_.Extent.StartLineNumber) char $($_.Extent.StartColumnNumber): $($_.Message)"
              }
              exit 1
          }
          Write-Host "install.ps1 syntax OK ($($tokens.Count) tokens)"

      - name: Setup Node.js
        uses: actions/setup-node@v6 # v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Validate Apple signing/notarization secrets (macOS release)
        if: runner.os == 'macOS' && github.event_name == 'release'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=()
          for key in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required Apple signing/notarization secrets: ${missing[*]}"
            echo "::error::Unsigned macOS artifacts are blocked by Gatekeeper as 'damaged'."
            exit 1
          fi

      - name: Validate Apple certificate payload (macOS release)
        if: runner.os == 'macOS' && github.event_name == 'release'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          cert_p12_file="$RUNNER_TEMP/apple-cert.p12"
          # APPLE_CERTIFICATE must be base64 of a .p12 blob.
          if ! python3 -c 'import base64,os,pathlib; out=pathlib.Path(os.environ["RUNNER_TEMP"]) / "apple-cert.p12"; out.write_bytes(base64.b64decode(os.environ["APPLE_CERTIFICATE"], validate=True))'; then
            echo "::error::APPLE_CERTIFICATE is not valid base64. It must be base64-encoded .p12 data."
            exit 1
          fi

          # Validate the decoded blob is a readable PKCS#12 with provided password.
          if ! openssl pkcs12 -in "$cert_p12_file" -nokeys -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -info >/dev/null 2>&1; then
            echo "::error::APPLE_CERTIFICATE/APPLE_CERTIFICATE_PASSWORD do not form a valid PKCS#12 certificate."
            echo "::error::Re-export the Developer ID Application cert as .p12 and store its base64 in APPLE_CERTIFICATE."
            exit 1
          fi

      - name: Cache Rust targets
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/bootstrap-installer/src-tauri

      - name: Build bootstrap installer
        run: npm run tauri:build
        working-directory: apps/bootstrap-installer
        env:
          # Immutable pin for bundled installer scripts.
          HERMES_BUILD_PIN_COMMIT: ${{ github.sha }}
          HERMES_BUILD_PIN_BRANCH: ${{ github.ref_name }}
          # Tauri/bundler macOS signing + notarization inputs. On non-macOS they
          # are ignored. On macOS release jobs, the preflight step above enforces
          # these are present so we don't publish Gatekeeper-blocked artifacts.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Collect macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          cp -v apps/bootstrap-installer/src-tauri/target/release/bundle/dmg/*.dmg release-artifacts/

      - name: Collect Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          $candidates = @(
            "apps/bootstrap-installer/src-tauri/target/release/*.exe",
            "apps/bootstrap-installer/src-tauri/target/release/bundle/*/*.exe"
          )

          $files = @()
          foreach ($pattern in $candidates) {
            $files += Get-ChildItem -Path $pattern -File -ErrorAction SilentlyContinue
          }

          $files = $files | Sort-Object FullName -Unique
          if (-not $files -or $files.Count -eq 0) {
            throw "No Windows .exe artifacts found under target/release"
          }

          $files | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination "release-artifacts" -Force
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bootstrap-installer-${{ runner.os }}-${{ steps.version.outputs.installer_version || 'repo-version' }}
          path: release-artifacts/*
          if-no-files-found: error

  publish-release-assets:
    name: Publish Release Assets
    if: github.event_name == 'release'
    needs: build-installers
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets

      - name: Upload installers to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release-assets/**/*.dmg release-assets/**/*.exe)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release artifacts found"
            exit 1
          fi
          gh release upload "$TAG" "${files[@]}" --clobber
