name: Release Bootstrap Installers

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to build from (e.g. refs/tags/v0.1.32). Run workflow from main."
        required: false
        type: string
      version:
        description: "Installer version override (e.g. 0.1.0 or v0.1.0)"
        required: false
        type: string
      changelog:
        description: "Release changelog/notes. Use \\n for line breaks."
        required: false
        type: string
      create_release:
        description: "Create/update a GitHub Release and upload artifacts"
        required: false
        default: true
        type: boolean
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build-installers:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, self-hosted-windows]

    steps:
      - name: Enforce main workflow ref (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        shell: bash
        run: |
          echo "::error::Run workflow_dispatch from refs/heads/main so Azure OIDC subject matches main."
          echo "::error::Use input 'source_ref' to build a tag/commit while keeping workflow ref on main."
          exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_ref || github.ref }}

      - name: Resolve installer version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          raw=""
          if [ "$EVENT_NAME" = "release" ] && [ -n "${RELEASE_TAG:-}" ]; then
            raw="$RELEASE_TAG"
          elif [ -n "${INPUT_VERSION:-}" ]; then
            raw="$INPUT_VERSION"
          else
            raw=""
          fi

          if [ -n "$raw" ]; then
            clean="${raw#v}"
            if [[ ! "$clean" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::Invalid version '$raw'. Use SemVer like 0.1.0 or v0.1.0"
              exit 1
            fi
            echo "installer_version=$clean" >> "$GITHUB_OUTPUT"
            echo "Using installer version: $clean"
          else
            echo "installer_version=" >> "$GITHUB_OUTPUT"
            echo "No override version provided; using checked-in installer version"
          fi

      - name: Apply installer version override
        if: steps.version.outputs.installer_version != ''
        shell: bash
        env:
          INSTALLER_VERSION: ${{ steps.version.outputs.installer_version }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const version = process.env.INSTALLER_VERSION;
          if (!version) process.exit(0);

          const pkgPath = 'apps/bootstrap-installer/package.json';
          const tauriPath = 'apps/bootstrap-installer/src-tauri/tauri.conf.json';
          const cargoPath = 'apps/bootstrap-installer/src-tauri/Cargo.toml';
          const manifestPath = 'apps/bootstrap-installer/src-tauri/hermes-setup.manifest';

          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          pkg.version = version;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');

          const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          tauri.version = version;
          fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + '\n');

          const cargo = fs.readFileSync(cargoPath, 'utf8')
            .replace(/^version\s*=\s*"[^"]+"/m, `version = "${version}"`);
          fs.writeFileSync(cargoPath, cargo);

          // NOTE: the manifest no longer contains a root <assemblyIdentity>
          // so there is no version field to update. Skipping manifest
          // version replacement avoids the regex accidentally matching
          // the <?xml version="1.0"?> declaration and corrupting it.
          // (Previously: .replace(/version="[0-9A-Za-z.+-]+"/m, ...) was
          // hitting the XML declaration's own version="1.0" attribute,
          // replacing it with e.g. version="0.0.8.0" — invalid XML that
          // made Windows SxS refuse to load the activation context.)

          console.log(`Applied installer version ${version}`);
          NODE

      - name: Validate install.ps1 syntax (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $errors = $null
          $tokens = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
              "${{ github.workspace }}\scripts\install.ps1",
              [ref]$tokens,
              [ref]$errors
          )
          if ($errors.Count -gt 0) {
              $errors | ForEach-Object {
                  Write-Error "install.ps1 syntax error — line $($_.Extent.StartLineNumber) char $($_.Extent.StartColumnNumber): $($_.Message)"
              }
              exit 1
          }
          Write-Host "install.ps1 syntax OK ($($tokens.Count) tokens)"

      - name: Setup Node.js
        uses: actions/setup-node@v6 # v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust targets
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/bootstrap-installer/src-tauri

      - name: Refresh Cargo Windows crates cache (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $srcRoot = Join-Path $env:USERPROFILE ".cargo\registry\src"
          $cacheRoot = Join-Path $env:USERPROFILE ".cargo\registry\cache"
          $patterns = @("windows-sys-*", "windows-targets-*")

          foreach ($root in @($srcRoot, $cacheRoot)) {
            if (-not (Test-Path $root)) {
              continue
            }
            Get-ChildItem -Path $root -Directory -ErrorAction SilentlyContinue | ForEach-Object {
              $indexDir = $_.FullName
              foreach ($pattern in $patterns) {
                Get-ChildItem -Path (Join-Path $indexDir $pattern) -Force -ErrorAction SilentlyContinue | ForEach-Object {
                  Remove-Item -LiteralPath $_.FullName -Recurse -Force -ErrorAction SilentlyContinue
                }
              }
            }
          }

          $manifest = "apps/bootstrap-installer/src-tauri/Cargo.toml"
          $lockfile = "apps/bootstrap-installer/src-tauri/Cargo.lock"
          if (Test-Path $lockfile) {
            cargo fetch --manifest-path $manifest --locked
          } else {
            cargo fetch --manifest-path $manifest
          }

      - name: Setup Python
        if: steps.version.outputs.installer_version != ''
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Sync Python package version from release tag
        if: steps.version.outputs.installer_version != ''
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.installer_version }}
        run: python scripts/set_version.py "$RELEASE_VERSION"

      - name: Build bootstrap installer
        run: npm run tauri:build
        working-directory: apps/bootstrap-installer
        env:
          # Immutable pin for bundled installer scripts.
          HERMES_BUILD_PIN_COMMIT: ${{ github.sha }}
          HERMES_BUILD_PIN_BRANCH: ${{ github.ref_name }}

      - name: Install Azure CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $azCmd = Get-Command az -ErrorAction SilentlyContinue
          if (-not $azCmd) {
            Write-Host "Azure CLI not found, installing..."
            Invoke-WebRequest -Uri https://aka.ms/installazurecliwindows -OutFile AzureCLI.msi
            Start-Process msiexec.exe -Wait -ArgumentList '/I AzureCLI.msi /quiet'
            Remove-Item AzureCLI.msi
            # Standard install path for Azure CLI MSI
            $azDir = "C:\Program Files\Microsoft SDKs\Azure\CLI2\wbin"
            if (-not (Test-Path $azDir)) {
              $azDir = "C:\Program Files (x86)\Microsoft SDKs\Azure\CLI2\wbin"
            }
            Write-Host "Adding $azDir to GITHUB_PATH"
            Add-Content -Path $env:GITHUB_PATH -Value $azDir
            $env:PATH = "$azDir;$env:PATH"
            Write-Host "Azure CLI installed: $($env:PATH -split ';' | Where-Object { $_ -like '*CLI2*' })"
          } else {
            Write-Host "Azure CLI already present at: $($azCmd.Source)"
          }

      - name: Azure login (OIDC)
        id: azure_login
        if: runner.os == 'Windows' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows installer with Azure Artifact Signing
        if: runner.os == 'Windows' && github.ref == 'refs/heads/main' && steps.azure_login.outcome == 'success'
        continue-on-error: true
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_SIGNING_CERTIFICATE_PROFILE }}
          # Sign both raw exe and bundled NSIS installer.
          files-folder: ${{ github.workspace }}\apps\bootstrap-installer\src-tauri\target\release
          files-folder-filter: exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Warn if Windows installer is unsigned
        if: runner.os == 'Windows' && (github.ref != 'refs/heads/main' || steps.azure_login.outcome != 'success')
        shell: bash
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::warning::Skipping Azure signing on non-main ref (${GITHUB_REF}). Windows installer will be released unsigned."
          else
            echo "::warning::Azure login failed — Windows installer will be released unsigned."
          fi

      - name: Collect macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          cp -v apps/bootstrap-installer/src-tauri/target/release/bundle/dmg/*.dmg release-artifacts/

      - name: Collect Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          INSTALLER_VERSION: ${{ steps.version.outputs.installer_version }}
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          $candidates = @(
            "apps/bootstrap-installer/src-tauri/target/release/*.exe",
            "apps/bootstrap-installer/src-tauri/target/release/bundle/*/*.exe"
          )

          $version = $env:INSTALLER_VERSION
          if (-not $version) {
            $pkg = Get-Content -LiteralPath "apps/bootstrap-installer/package.json" -Raw | ConvertFrom-Json
            $version = [string]$pkg.version
          }
          if (-not $version) {
            throw "Could not resolve installer version for Windows artifact naming"
          }

          $files = @()
          foreach ($pattern in $candidates) {
            $files += Get-ChildItem -Path $pattern -File -ErrorAction SilentlyContinue
          }

          $files = $files | Sort-Object FullName -Unique
          if (-not $files -or $files.Count -eq 0) {
            throw "No Windows .exe artifacts found under target/release"
          }

          $files | ForEach-Object {
            $base = [System.IO.Path]::GetFileNameWithoutExtension($_.Name)
            $ext = [System.IO.Path]::GetExtension($_.Name)
            if ($base -match [regex]::Escape($version)) {
              $targetName = "$base$ext"
            } else {
              $targetName = "$base-$version$ext"
            }
            Copy-Item -Path $_.FullName -Destination (Join-Path "release-artifacts" $targetName) -Force
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bootstrap-installer-${{ runner.os }}-${{ steps.version.outputs.installer_version || 'repo-version' }}
          path: release-artifacts/*
          if-no-files-found: error

  publish-release-assets:
    name: Publish Release Assets
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    needs: build-installers
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            if [ -z "${RELEASE_TAG:-}" ]; then
              echo "::error::release trigger missing tag_name"
              exit 1
            fi
            echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${INPUT_VERSION:-}" ]; then
            echo "::error::workflow_dispatch release creation requires input 'version' (e.g. 0.1.0 or v0.1.0)"
            exit 1
          fi

          clean="${INPUT_VERSION#v}"
          if [[ ! "$clean" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version '${INPUT_VERSION}'. Use SemVer like 0.1.0 or v0.1.0"
            exit 1
          fi
          echo "tag=v$clean" >> "$GITHUB_OUTPUT"

      - name: Ensure release exists (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
          TARGET_SHA: ${{ github.sha }}
          CHANGELOG: ${{ github.event.inputs.changelog }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            notes="Automated bootstrap installer release from workflow_dispatch."
            if [ -n "${CHANGELOG:-}" ]; then
              # workflow_dispatch string inputs are single-line in UI.
              # Support escaped newlines (\n) so users can provide multi-line notes.
              notes="$(printf '%b' "$CHANGELOG")"
            fi
            gh release create "$TAG" \
              --draft \
              --target "$TARGET_SHA" \
              --title "Bootstrap Installer $TAG" \
              --notes "$notes"
          fi

      - name: Generate release notes from commits (GitHub Models)
        id: ai_notes
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          notes_file="$RUNNER_TEMP/bootstrap-release-notes.md"
          commits_file="$RUNNER_TEMP/bootstrap-release-commits.md"

          prev_tag="$(gh release list --repo "$GH_REPO" --limit 100 --json tagName --jq '.[] | .tagName' | awk -v cur="$TAG" '$0 != cur { print; exit }')"

          if [ -n "${prev_tag:-}" ]; then
            compare_json="$(gh api "repos/$GH_REPO/compare/${prev_tag}...${TARGET_SHA}")"
            jq -r '.commits[] | "- `\(.sha[0:7])` \((.commit.message | split("\n"))[0]) (@\(.author.login // .commit.author.name // "unknown"))"' \
              <<<"$compare_json" > "$commits_file"
            range_label="${prev_tag}...${TAG}"
          else
            commits_json="$(gh api "repos/$GH_REPO/commits?sha=${TARGET_SHA}&per_page=40")"
            jq -r '.[] | "- `\(.sha[0:7])` \((.commit.message | split("\n"))[0]) (@\(.author.login // .commit.author.name // "unknown"))"' \
              <<<"$commits_json" > "$commits_file"
            range_label="up to ${TAG}"
          fi

          if [ ! -s "$commits_file" ]; then
            echo "- No commit metadata available." > "$commits_file"
          fi

          {
            echo "## Changes"
            echo
            echo "_Range: ${range_label}_"
            echo
            cat "$commits_file"
          } > "$notes_file"

          # Best-effort LLM summary via GitHub Models API.
          # Fallback is the raw commit bullets generated above.
          prompt_payload="$(jq -n \
            --arg range "$range_label" \
            --arg commits "$(cat "$commits_file")" \
            '{
              model: "gpt-4.1-mini",
              temperature: 0.2,
              messages: [
                {
                  role: "system",
                  content: "You write concise release notes in GitHub-flavored markdown. Group into short sections and keep only user-visible, meaningful changes. Avoid speculation."
                },
                {
                  role: "user",
                  content: ("Summarize these commits into release notes.\n\nRange: " + $range + "\n\nCommits:\n" + $commits)
                }
              ]
            }')"

          set +e
          ai_response="$(curl -sS -X POST "https://api.github.com/copilot/v1/chat/completions" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "$prompt_payload")"
          curl_status=$?
          set -e

          if [ $curl_status -eq 0 ]; then
            ai_notes="$(jq -r '
              (.choices[0].message.content // "") as $c
              | if ($c|type) == "string" then $c
                elif ($c|type) == "array" then ($c | map(.text // .content // "") | join(""))
                else ""
                end
            ' <<<"$ai_response" 2>/dev/null || true)"
            if [ -n "${ai_notes:-}" ]; then
              {
                echo "$ai_notes"
                echo
                echo "---"
                echo
                echo "_Commit range: ${range_label}_"
              } > "$notes_file"
            else
              echo "::warning::GitHub Models response was empty; using commit bullets fallback."
            fi
          else
            echo "::warning::GitHub Models request failed; using commit bullets fallback."
          fi

          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Update release notes
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
          NOTES_FILE: ${{ steps.ai_notes.outputs.notes_file }}
        run: |
          set -euo pipefail
          gh release edit "$TAG" --notes-file "$NOTES_FILE"

      - name: Download all installer artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets

      - name: Upload installers to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release-assets/**/*.dmg release-assets/**/*.exe)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release artifacts found"
            exit 1
          fi
          gh release upload "$TAG" "${files[@]}" --clobber
