name: outlook-platform
label: Microsoft Outlook (Graph API)
kind: platform
version: 1.0.0
description: >
  Microsoft Outlook email adapter for Hermes Agent via the Microsoft Graph
  API. Polls the inbox for new messages (delegated or shared mailbox) and
  sends replies through Graph — no IMAP/SMTP credentials required.
  Supports app-only (client_credentials) authentication.
author: Hermes Agent
requires_env:
  - name: OUTLOOK_TENANT_ID
    description: "Azure AD tenant ID hosting the app registration"
    prompt: "Azure AD tenant ID"
    url: "https://portal.azure.com/#view/Microsoft_AAD_IAM/ActiveDirectoryMenuBlade/~/Overview"
    password: false
  - name: OUTLOOK_CLIENT_ID
    description: "Azure AD application (client) ID with Mail.Read/Mail.Send; add Calendars.Read for calendar tool"
    prompt: "Azure AD application (client) ID"
    url: "https://portal.azure.com/#view/Microsoft_AAD_IAM/ActiveDirectoryMenuBlade/~/RegisteredApps"
    password: false
  - name: OUTLOOK_CLIENT_SECRET
    description: "Azure AD application client secret"
    prompt: "Azure AD client secret"
    url: "https://portal.azure.com/"
    password: true
  - name: OUTLOOK_MAILBOX
    description: "UPN or email address of the mailbox to monitor (e.g. agent@company.com)"
    prompt: "Mailbox UPN / email address"
    password: false
optional_env:
  - name: OUTLOOK_ALLOWED_USERS
    description: "Comma-separated list of sender addresses allowed to trigger the agent"
    prompt: "Allowed senders (comma-separated, or empty for all)"
    password: false
  - name: OUTLOOK_ALLOW_ALL_USERS
    description: "Allow any sender to trigger the agent (not recommended for production)"
    prompt: "Allow all senders? (true/false)"
    password: false
  - name: OUTLOOK_POLL_INTERVAL
    description: "Seconds between inbox checks (default: 30)"
    prompt: "Poll interval in seconds"
    password: false
  - name: OUTLOOK_HOME_CHANNEL
    description: "Sender email to use as default destination for cron / notification delivery"
    prompt: "Home channel (email address, or empty)"
    password: false
